name: Build installers

# Build the desktop installers for Linux, Windows, and macOS on every push to
# main, and upload each platform's bundle as a downloadable workflow artifact.
# Automatic runs are restricted to main; workflow_dispatch allows a manual run
# from the Actions tab. (The dedicated build-macos.yml still handles tag releases
# and universal-.dmg-on-demand — this one is the "installers for the latest main"
# convenience.)
on:
  push:
    branches: [main]
  workflow_dispatch:

# One in-flight installer build per ref; a newer push cancels the older one.
concurrency:
  group: installers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Installers (${{ matrix.os }})
    strategy:
      # Don't let one platform's failure cancel the other two.
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: jnana-linux
            # rust-toolchain `targets` + `tauri build` args (default host target).
            target: ''
            args: ''
            paths: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm
              src-tauri/target/release/bundle/appimage/*.AppImage
          - os: windows-latest
            artifact: jnana-windows
            target: ''
            args: ''
            paths: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          - os: macos-latest
            artifact: jnana-macos
            # Universal binary so the .dmg runs on both Intel and Apple Silicon.
            target: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target universal-apple-darwin
            paths: |
              src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Tauri v2's Linux runtime/build dependencies. No-op on Windows/macOS.
      # Use libayatana-appindicator3-dev only — libappindicator3-dev (Tauri v1)
      # Conflicts with it and breaks apt on ubuntu-latest.
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          # Empty on Linux/Windows (host target); both Apple arches on macOS.
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      # `tauri build` runs `npm run build` (beforeBuildCommand) then packages the
      # platform installers declared by bundle.targets ("all" in tauri.conf.json).
      - name: Build installers
        run: npx tauri build ${{ matrix.args }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.paths }}
          if-no-files-found: error
