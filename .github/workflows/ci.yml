name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Frontend typecheck + tests. OS-independent, so run once on Linux for speed.
  frontend:
    name: Frontend (tsc + vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Test (vitest run)
        run: npm test

  # Rust tests + build, plus a full `tauri build` to confirm the bundles the app
  # declares (bundle.targets: "all") actually build on each platform.
  rust:
    name: Rust + bundle (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Tauri v2's Linux runtime/build dependencies (webkit2gtk 4.1, ayatana app
      # indicator, rsvg, patchelf for AppImage). No-op on Windows/macOS.
      # NOTE: use libayatana-appindicator3-dev only — the old libappindicator3-dev
      # (Tauri v1) Conflicts with it and breaks `apt-get install` on ubuntu-latest.
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      # Cache the Cargo registry + target dir, keyed on the src-tauri lockfile.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: cargo test
        working-directory: src-tauri
        run: cargo test

      - name: cargo build
        working-directory: src-tauri
        run: cargo build

      # Full bundle build (runs `npm run build` via beforeBuildCommand, then
      # packages the platform installers). Verifies the packaged app actually builds.
      - name: tauri build
        run: npm run tauri build
